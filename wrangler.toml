name = "sotaque"
compatibility_date = "2025-04-01"
pages_build_output_dir = "./dist"

[vars]
TERMO_VERSAO = "1.0"

# Preencher com a secret do Turnstile via:
#   wrangler pages secret put TURNSTILE_SECRET_KEY
# (nunca commitar a secret aqui)

[[d1_databases]]
binding = "DB"
database_name = "sotaque-db"
database_id = "3eab40eb-c1b8-4574-a216-617df8533a5a"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "sotaque-audios"
