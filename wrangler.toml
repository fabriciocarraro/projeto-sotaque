name = "sotaque"
compatibility_date = "2025-04-01"
pages_build_output_dir = "./dist"

[vars]
TERMO_VERSAO = "1.0"
PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAADBerp_JVxVHVDLK"

# Secrets (TURNSTILE_SECRET_KEY, OPENAI_API_KEY, ANTHROPIC_API_KEY,
# WHATSAPP_ACCESS_TOKEN, WHATSAPP_APP_SECRET, WHATSAPP_VERIFY_TOKEN,
# WHATSAPP_PHONE_NUMBER_ID) são gerenciadas no dashboard do Cloudflare
# Pages (Settings → Environment variables → encrypt).

[[d1_databases]]
binding = "DB"
database_name = "sotaque-db"
database_id = "3eab40eb-c1b8-4574-a216-617df8533a5a"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "sotaque-audios"
